<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Симулятор Мікроскопа</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep:    #0A1628;
            --bg-panel:   #111D30;
            --bg-card:    #162036;
            --bg-hover:   #1C2A44;
            --accent:     #00D97E;
            --amber:      #F5A623;
            --glass:      #C8D8E4;
            --text-hi:    #EDF2F8;
            --text-mid:   #8FA3BC;
            --text-lo:    #4A6080;
            --border:     rgba(200,216,228,0.08);
            --border-hi:  rgba(200,216,228,0.18);
            --glow:       0 0 24px rgba(0,217,126,0.25);
        }

        html, body {
            height: 100%;
            background: var(--bg-deep);
            color: var(--text-hi);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .app {
            display: grid;
            grid-template-rows: 56px 1fr;
            grid-template-columns: 220px 1fr 260px;
            height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }

        .topbar-brand { display: flex; align-items: center; gap: 10px; }

        .brand-icon {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 15px;
            letter-spacing: 0.03em; color: var(--text-hi);
        }
        .brand-name span { color: var(--accent); }

        .topbar-meta { display: flex; align-items: center; gap: 6px; }

        .lang-btn {
            background: none;
            border: 1px solid var(--border-hi);
            color: var(--text-mid);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
            padding: 4px 10px; border-radius: 4px; cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover {
            background: var(--accent); border-color: var(--accent); color: #000;
        }

        /* LEFT PANEL */
        .panel-slides {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 20px 14px; gap: 12px;
            overflow-y: auto;
        }

        .panel-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-lo); padding: 0 6px; margin-bottom: 4px;
        }

        .slide-card {
            border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
            cursor: pointer; transition: all 0.2s;
            background: var(--bg-card);
        }
        .slide-card:hover { border-color: var(--border-hi); background: var(--bg-hover); }
        .slide-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 4px 16px rgba(0,217,126,0.2);
        }

        .slide-thumb {
            width: 100%; height: 80px; object-fit: cover;
            display: block; opacity: 0.85; transition: opacity 0.2s;
        }
        .slide-card:hover .slide-thumb, .slide-card.active .slide-thumb { opacity: 1; }

        .slide-info { padding: 8px 10px; }

        .slide-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.1em; color: var(--accent);
            text-transform: uppercase; margin-bottom: 2px;
        }

        .slide-name {
            font-size: 11px; font-weight: 500;
            color: var(--text-hi); line-height: 1.3;
        }

        /* CENTER */
        .viewport {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg-deep);
            position: relative; gap: 24px;
        }

        .eyepiece-wrap {
            position: relative;
            width: min(60vh, 58vw, 480px);
            aspect-ratio: 1;
        }

        .eyepiece-outer {
            position: absolute; inset: 0; border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #1A2A3C 0deg, #243448 30deg, #2E4060 60deg,
                #1A2A3C 90deg, #243448 150deg, #1E3050 180deg,
                #2E4060 240deg, #243448 300deg, #1A2A3C 360deg
            );
            box-shadow:
                0 0 0 3px #0A1220,
                0 0 0 5px #243040,
                0 0 0 7px #0A1220,
                0 20px 60px rgba(0,0,0,0.7),
                0 0 80px rgba(0,217,126,0.05);
        }

        .eyepiece-inner {
            position: absolute; inset: 10px; border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #152030 0%, #080F1A 60%, #040912 100%);
            overflow: hidden;
        }

        .specimen-img {
            position: absolute;
            width: 150%; height: 150%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover; pointer-events: none;
            z-index: 1; transition: opacity 0.3s ease;
        }

        .reticle-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
            z-index: 2; transition: opacity 0.2s;
        }

        .glass-overlay {
            position: absolute; inset: 0; border-radius: 50%;
            pointer-events: none; z-index: 3;
            background:
                radial-gradient(circle at 28% 22%, rgba(255,255,255,0.07) 0%, transparent 40%),
                radial-gradient(circle at 75% 80%, rgba(255,255,255,0.03) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.85) 100%);
        }
        .glass-overlay::after {
            content: '';
            position: absolute;
            top: 8%; left: 15%;
            width: 30%; height: 14%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.12) 0%, transparent 100%);
            border-radius: 50%; transform: rotate(-25deg);
        }

        .drag-zone {
            position: absolute; inset: 10px; border-radius: 50%;
            z-index: 4; cursor: grab; touch-action: none;
        }
        .drag-zone:active { cursor: grabbing; }

        .specimen-badge {
            position: absolute; bottom: -16px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-panel);
            border: 1px solid var(--border-hi);
            border-radius: 20px; padding: 5px 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px; font-weight: 500;
            color: var(--text-mid); white-space: nowrap;
            letter-spacing: 0.02em; z-index: 5;
        }

        .mag-row {
            display: flex; gap: 8px; align-items: center;
        }

        .mag-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text-lo); margin-right: 4px;
        }

        .mag-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
            padding: 6px 16px; border-radius: 6px;
            border: 1px solid var(--border-hi);
            background: var(--bg-card); color: var(--text-mid);
            cursor: pointer; transition: all 0.2s;
        }
        .mag-btn:hover { background: var(--bg-hover); color: var(--text-hi); }
        .mag-btn.active {
            background: var(--accent); border-color: var(--accent);
            color: #000; box-shadow: var(--glow);
        }

        /* RIGHT PANEL */
        .panel-controls {
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            padding: 20px 18px;
            display: flex; flex-direction: column; gap: 22px;
            overflow-y: auto;
        }

        .ctrl-section { display: flex; flex-direction: column; gap: 10px; }

        .ctrl-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-lo);
        }

        .slider-row { display: flex; flex-direction: column; gap: 6px; }

        .slider-name {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--text-mid);
        }

        .slider-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px; font-weight: 600; color: var(--accent);
            min-width: 32px; text-align: right;
        }

        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px; border-radius: 2px;
            background: var(--bg-hover); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--bg-deep);
            box-shadow: 0 0 6px rgba(0,217,126,0.4); transition: transform 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--bg-deep); cursor: pointer;
        }

        .dpad {
            display: grid;
            grid-template-areas: ". u ." "l . r" ". d .";
            gap: 5px; width: fit-content; margin: 0 auto;
        }

        .dpad-btn {
            width: 40px; height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-hi);
            border-radius: 8px; color: var(--text-mid);
            font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .dpad-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
        .dpad-btn:active { transform: scale(0.9); }
        .dpad-up    { grid-area: u; }
        .dpad-down  { grid-area: d; }
        .dpad-left  { grid-area: l; }
        .dpad-right { grid-area: r; }

        .divider { height: 1px; background: var(--border); margin: 0 -18px; }

        .status-row {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 10px; background: var(--bg-card);
            border-radius: 8px; border: 1px solid var(--border);
        }

        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .status-text { font-size: 11px; color: var(--text-mid); }

        /* MOBILE */
        @media (max-width: 768px) {
            html, body { overflow: auto; }
            .app { display: flex; flex-direction: column; height: auto; min-height: 100vh; }
            .topbar { position: sticky; top: 0; z-index: 100; }
            .panel-slides {
                flex-direction: row; overflow-x: auto; overflow-y: hidden;
                padding: 12px; gap: 10px;
                border-right: none; border-bottom: 1px solid var(--border);
                min-height: unset;
            }
            .slide-card { min-width: 130px; flex-shrink: 0; }
            .slide-thumb { height: 60px; }
            .viewport { padding: 24px 16px 40px; }
            .eyepiece-wrap { width: min(80vw, 340px); }
            .panel-controls { border-left: none; border-top: 1px solid var(--border); padding: 16px; gap: 16px; }
        }

        @media (max-width: 480px) {
            .eyepiece-wrap { width: 78vw; }
        }
    </style>
</head>
<body>
<div class="app">

    <header class="topbar">
        <div class="topbar-brand">
            <div class="brand-icon">🔬</div>
            <div class="brand-name">Micro<span>Lab</span></div>
        </div>
        <div class="topbar-meta">
            <button class="lang-btn" data-lang="ua">UA</button>
            <button class="lang-btn active" data-lang="en">EN</button>
        </div>
    </header>

    <aside class="panel-slides">
        <div class="panel-label" data-i18n="slides">Specimens</div>

        <div class="slide-card active" data-slide="1">
            <img class="slide-thumb" src="https://i.postimg.cc/15RHphCw/slide1.png" alt="Slide 1" loading="lazy">
            <div class="slide-info">
                <div class="slide-num">01</div>
                <div class="slide-name" data-slide-name="1">Frog's Blood</div>
            </div>
        </div>

        <div class="slide-card" data-slide="2">
            <img class="slide-thumb" src="https://i.postimg.cc/xTsP5xh7/slide2.png" alt="Slide 2" loading="lazy">
            <div class="slide-info">
                <div class="slide-num">02</div>
                <div class="slide-name" data-slide-name="2">Simple Columnar Epithelium</div>
            </div>
        </div>

        <div class="slide-card" data-slide="3">
            <img class="slide-thumb" src="https://i.postimg.cc/qvSxVtkx/slide3.png" alt="Slide 3" loading="lazy">
            <div class="slide-info">
                <div class="slide-num">03</div>
                <div class="slide-name" data-slide-name="3">Human Artery, Vein & Nerve</div>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <div class="eyepiece-wrap">
            <div class="eyepiece-outer"></div>
            <div class="eyepiece-inner">
                <img id="specimen-image" class="specimen-img" src="https://i.postimg.cc/66nYy7sb/2025-06-12-234612.png" alt="Specimen">
                <img id="reticle" class="reticle-img" src="https://i.postimg.cc/j2c4GZ5D/reticle.png" alt="Reticle">
                <div class="glass-overlay"></div>
                <div class="drag-zone" id="drag-zone"></div>
            </div>
            <div class="specimen-badge" id="specimen-badge">Frog's Blood</div>
        </div>

        <div class="mag-row">
            <span class="mag-label" data-i18n="mag">Mag</span>
            <button class="mag-btn active" data-mag="3x">3×</button>
            <button class="mag-btn" data-mag="10x">10×</button>
            <button class="mag-btn" data-mag="40x">40×</button>
        </div>
    </main>

    <aside class="panel-controls">

        <div class="status-row">
            <div class="status-dot"></div>
            <span class="status-text" data-i18n="ready">System ready</span>
        </div>

        <div class="ctrl-section">
            <div class="ctrl-label" data-i18n="optics">Optics</div>

            <div class="slider-row">
                <div class="slider-name">
                    <span>🧪 <span data-i18n="specFocus">Specimen focus</span></span>
                    <span class="slider-val" id="val-focus">5</span>
                </div>
                <input id="specimen-focus" type="range" min="0" max="10" value="5">
            </div>

            <div class="slider-row">
                <div class="slider-name">
                    <span>📏 <span data-i18n="reticleFocus">Reticle</span></span>
                    <span class="slider-val" id="val-reticle">50%</span>
                </div>
                <input id="reticle-focus" type="range" min="0" max="1" step="0.01" value="0.5">
            </div>

            <div class="slider-row">
                <div class="slider-name">
                    <span>💡 <span data-i18n="lamp">Illumination</span></span>
                    <span class="slider-val" id="val-lamp">100%</span>
                </div>
                <input id="lamp-intensity" type="range" min="0.1" max="2" step="0.01" value="1.05">
            </div>
        </div>

        <div class="divider"></div>

        <div class="ctrl-section">
            <div class="ctrl-label" data-i18n="stage">Stage</div>
            <div class="dpad">
                <button class="dpad-btn dpad-up"    data-move="up">↑</button>
                <button class="dpad-btn dpad-left"  data-move="left">←</button>
                <button class="dpad-btn dpad-right" data-move="right">→</button>
                <button class="dpad-btn dpad-down"  data-move="down">↓</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="ctrl-section">
            <div class="ctrl-label" data-i18n="info">Info</div>
            <div style="font-size:11px; color:var(--text-mid); line-height:1.6;" id="specimen-info">
                Erythrocytes of Rana temporaria.<br>Oval shape, nucleated cells.
            </div>
        </div>

    </aside>
</div>

<script>
const specimens = {
    1: { '3x':'https://i.postimg.cc/66nYy7sb/2025-06-12-234612.png','10x':'https://i.postimg.cc/mg2wX8PK/2025-06-12-234625.png','40x':'https://i.postimg.cc/yxyd2hDb/photo-2025-06-09-21-13-43-3.jpg' },
    2: { '3x':'https://i.postimg.cc/Rh6dRFqh/Знімок_екрана_2025-06-12_234900.png','10x':'https://i.postimg.cc/d1Snrdsg/Знімок_екрана_2025-06-12_234912.png','40x':'https://i.postimg.cc/QMh63hYY/Знімок_екрана_2025-06-12_234920.png' },
    3: { '3x':'https://i.postimg.cc/cLHRMCjS/2025-06-12-235513.png','10x':'https://i.postimg.cc/7hk1gVvs/2025-06-12-235524.png','40x':'https://i.postimg.cc/65zq00J7/photo-2025-06-09-21-13-44.jpg' }
};

const i18n = {
    ua: { slides:'Препарати', mag:'Збільш.', optics:'Оптика', specFocus:'Фокус препарату', reticleFocus:'Шкала', lamp:'Освітлення', stage:'Предметний столик', info:'Інформація', ready:'Система готова' },
    en: { slides:'Specimens', mag:'Mag', optics:'Optics', specFocus:'Specimen focus', reticleFocus:'Reticle', lamp:'Illumination', stage:'Stage control', info:'Information', ready:'System ready' }
};

const slideNames = {
    1:{ ua:'Кров жаби', en:"Frog's Blood" },
    2:{ ua:'Стовпчастий епітелій', en:'Columnar Epithelium' },
    3:{ ua:'Артерія, вена та нерв', en:'Artery, Vein & Nerve' }
};

const specimenInfo = {
    1:{ ua:'Еритроцити Rana temporaria.\nОвальна форма, клітини з ядром.', en:'Erythrocytes of Rana temporaria.\nOval shape, nucleated cells.' },
    2:{ ua:'Простий одношаровий епітелій.\nКишечник або шлунок.', en:'Simple columnar epithelium.\nIntestinal or gastric lining.' },
    3:{ ua:'Поперечний зріз периферичного нерва, артерії та вени.', en:'Cross-section of peripheral nerve,\nartery and vein.' }
};

let st = { lang:'en', specimen:1, mag:'3x', tx:0, ty:0, dragging:false, sx:0, sy:0 };

const $img    = document.getElementById('specimen-image');
const $ret    = document.getElementById('reticle');
const $badge  = document.getElementById('specimen-badge');
const $fSlider= document.getElementById('specimen-focus');
const $rSlider= document.getElementById('reticle-focus');
const $lSlider= document.getElementById('lamp-intensity');
const $vF     = document.getElementById('val-focus');
const $vR     = document.getElementById('val-reticle');
const $vL     = document.getElementById('val-lamp');
const $info   = document.getElementById('specimen-info');
const $drag   = document.getElementById('drag-zone');

const clamp = (v,a,b) => Math.min(Math.max(v,a),b);

function applyFilters() {
    const blur = parseFloat($fSlider.value);
    const lamp = parseFloat($lSlider.value);
    $img.style.filter = `blur(${blur}px) brightness(${lamp})`;
    $ret.style.opacity = $rSlider.value;
    $vF.textContent = parseFloat(blur).toFixed(0);
    $vR.textContent = Math.round($rSlider.value * 100) + '%';
    $vL.textContent = Math.round(lamp * 100) + '%';
}

function updatePos() {
    $img.style.transform = `translate(calc(-50% + ${st.tx}px), calc(-50% + ${st.ty}px))`;
}

function loadSpecimen() {
    $img.style.opacity = '0';
    $img.src = specimens[st.specimen][st.mag];
    st.tx = 0; st.ty = 0; updatePos();
    $badge.textContent = slideNames[st.specimen][st.lang];
    $info.innerHTML = specimenInfo[st.specimen][st.lang].replace('\n','<br>');
    setTimeout(() => $img.style.opacity = '1', 300);
}

function applyLang() {
    const t = i18n[st.lang];
    document.querySelectorAll('[data-i18n]').forEach(el => { if(t[el.dataset.i18n]) el.textContent = t[el.dataset.i18n]; });
    document.querySelectorAll('[data-slide-name]').forEach(el => {
        el.textContent = slideNames[parseInt(el.dataset.slideName)][st.lang];
    });
    $badge.textContent = slideNames[st.specimen][st.lang];
    $info.innerHTML = specimenInfo[st.specimen][st.lang].replace('\n','<br>');
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === st.lang));
}

function moveStage(dir) {
    const step = 12, max = $drag.offsetWidth * 0.28;
    if(dir==='up')    st.ty = clamp(st.ty-step,-max,max);
    if(dir==='down')  st.ty = clamp(st.ty+step,-max,max);
    if(dir==='left')  st.tx = clamp(st.tx-step,-max,max);
    if(dir==='right') st.tx = clamp(st.tx+step,-max,max);
    updatePos();
}

$drag.addEventListener('mousedown', e => { st.dragging=true; st.sx=e.clientX; st.sy=e.clientY; });
document.addEventListener('mousemove', e => {
    if(!st.dragging) return;
    const max = $drag.offsetWidth*0.28;
    st.tx = clamp(st.tx+e.clientX-st.sx,-max,max);
    st.ty = clamp(st.ty+e.clientY-st.sy,-max,max);
    st.sx=e.clientX; st.sy=e.clientY; updatePos();
});
document.addEventListener('mouseup', ()=>{ st.dragging=false; });

$drag.addEventListener('touchstart', e => {
    e.preventDefault(); const t=e.touches[0];
    st.dragging=true; st.sx=t.clientX; st.sy=t.clientY;
}, {passive:false});
$drag.addEventListener('touchmove', e => {
    e.preventDefault(); if(!st.dragging) return;
    const max=$drag.offsetWidth*0.28, t=e.touches[0];
    st.tx=clamp(st.tx+t.clientX-st.sx,-max,max);
    st.ty=clamp(st.ty+t.clientY-st.sy,-max,max);
    st.sx=t.clientX; st.sy=t.clientY; updatePos();
}, {passive:false});
$drag.addEventListener('touchend', ()=>{ st.dragging=false; });

document.querySelectorAll('.slide-card').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('.slide-card').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); st.specimen=parseInt(c.dataset.slide); loadSpecimen();
}));

document.querySelectorAll('.mag-btn').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.mag-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); st.mag=b.dataset.mag; loadSpecimen();
}));

document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', ()=>{ st.lang=b.dataset.lang; applyLang(); }));
document.querySelectorAll('.dpad-btn').forEach(b => b.addEventListener('click', ()=>moveStage(b.dataset.move)));
[$fSlider,$rSlider,$lSlider].forEach(s=>s.addEventListener('input',applyFilters));
document.addEventListener('keydown', e=>{
    const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
    if(m[e.key]){e.preventDefault();moveStage(m[e.key]);}
});

applyLang(); loadSpecimen(); applyFilters();
</script>
</body>
</html>
